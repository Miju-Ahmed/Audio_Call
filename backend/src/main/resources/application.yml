server:
  port: 8080

spring:
  application:
    name: voice-broadcast
  datasource:
    url: jdbc:postgresql://localhost:5432/voice_broadcast
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Twilio Configuration
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:your_account_sid}
  auth-token: ${TWILIO_AUTH_TOKEN:your_auth_token}
  phone-number: ${TWILIO_PHONE_NUMBER:+1234567890}

# Application Settings
app:
  webhook-base-url: ${WEBHOOK_BASE_URL:https://a1b2c3d4.ngrok-free.app}
  call:
    batch-size: 50
    batch-delay-ms: 2000
    max-concurrent: 200
    retry-max: 3
    retry-delay-seconds: 60

# Logging
logging:
  level:
    com.audiocall: DEBUG
    org.springframework.web.socket: INFO
